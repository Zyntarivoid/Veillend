name: VeilLend Backend CI

on:
  push:
    paths:
      - 'veilend-backend/**'
      - '.github/workflows/veilend-backend.yml'
  pull_request:
    paths:
      - 'veilend-backend/**'
      - '.github/workflows/veilend-backend.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: veilend-backend

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'veilend-backend/package-lock.json'

      - name: Install dependencies
        run: npm install --package-lock=false

      - name: Lint
        run: npm run lint:check

      - name: Test
        run: npm run test -- --runInBand

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t veillend-backend:test .
